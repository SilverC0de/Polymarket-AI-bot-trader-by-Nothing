<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polymarket 02 // finance</title>
  <style>
    :root {
      --bg: #020510;
      --bg-soft: #060d1a;
      --panel: rgba(10, 18, 32, 0.96);
      --panel-strong: rgba(10, 18, 32, 0.99);
      --border: rgba(178, 198, 226, 0.25);
      --border-strong: rgba(125, 211, 252, 0.44);
      --text: #f4f8ff;
      --muted: #c0cad8;
      --dim: #91a3b8;
      --accent: #7dd3fc;
      --accent-2: #8b5cf6;
      --good: #34d399;
      --warn: #fbbf24;
      --err: #fb7185;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background:
        radial-gradient(circle at 18% -8%, rgba(56, 189, 248, 0.12), transparent 34rem),
        radial-gradient(circle at 100% 8%, rgba(99, 102, 241, 0.10), transparent 32rem),
        linear-gradient(145deg, var(--bg) 0%, #050a15 48%, #020510 100%);
    }
    ::selection { background: rgba(103, 232, 249, 0.26); }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent 78%);
    }
    .wrap {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 32px;
    }
    header.hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 26px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(10, 18, 32, 0.99), rgba(5, 12, 24, 0.95)),
        linear-gradient(90deg, rgba(125, 211, 252, 0.09), rgba(99, 102, 241, 0.065));
      box-shadow: var(--shadow);
    }
    header.hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      border: 1px solid rgba(103, 232, 249, 0.20);
      box-shadow: 0 0 90px rgba(103, 232, 249, 0.12) inset;
    }
    .github-link {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(125, 211, 252, 0.38);
      border-radius: 999px;
      background: rgba(2, 5, 16, 0.72);
      color: var(--text);
      font: 12px var(--mono);
      text-decoration: none;
      transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
    }
    .github-link:hover {
      border-color: rgba(125, 211, 252, 0.74);
      background: rgba(14, 25, 43, 0.88);
      color: var(--accent);
    }
    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }
    h1 {
      position: relative;
      margin: 0;
      max-width: 780px;
      font-size: clamp(30px, 5vw, 54px);
      font-weight: 700;
      line-height: 1.02;
      letter-spacing: -0.035em;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }
    .historyPanel {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      background: var(--panel-strong);
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    /* Performance = primary read — top row, left */
    .panel--performance {
      border-color: rgba(52, 211, 153, 0.5);
      background:
        linear-gradient(145deg, rgba(52, 211, 153, 0.09) 0%, transparent 52%),
        var(--panel);
      box-shadow:
        var(--shadow),
        0 0 0 1px rgba(52, 211, 153, 0.14) inset;
    }
    .panel--performance .panel-head {
      border-bottom-color: rgba(52, 211, 153, 0.3);
      background: linear-gradient(90deg, rgba(52, 211, 153, 0.12), transparent 70%);
    }
    .panel--performance .panel-head > span:first-child {
      color: var(--good);
      text-shadow: 0 0 28px rgba(52, 211, 153, 0.35);
    }
    .panel--performance .panel-head .hint {
      color: rgba(167, 243, 208, 0.85);
    }
    .panel-body { padding: 18px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .panel-head .hint {
      letter-spacing: 0;
      text-transform: none;
    }
    .overview-head {
      text-transform: none;
      letter-spacing: 0.04em;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }
    .overview-head .overview-since-value {
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .receipt {
      font: 13px/1.55 var(--mono);
      border: 1px solid rgba(178, 198, 226, 0.22);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(3, 7, 18, 0.45);
    }
    .receipt-row {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.15fr);
      gap: 10px 18px;
      align-items: start;
      padding: 11px 15px;
      border-bottom: 1px dashed rgba(178, 198, 226, 0.2);
    }
    .receipt-row:last-child {
      border-bottom: none;
    }
    .receipt-row--skips {
      align-items: start;
    }
    /* Match other receipt values: sit on the right side of the grid cell */
    .receipt-v--skips {
      display: flex;
      justify-content: flex-end;
      text-align: left;
    }
    .skip-reason-list {
      margin: 0;
      padding-left: 1.35em;
      list-style: disc;
      list-style-position: outside;
      color: var(--text);
      text-align: left;
    }
    .skip-reason-item {
      margin-bottom: 12px;
    }
    .skip-reason-item:last-child {
      margin-bottom: 0;
    }
    .skip-reason-head {
      display: block;
      color: var(--text);
      font-weight: 650;
    }
    .receipt-k {
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .receipt-v {
      margin: 0;
      color: var(--text);
      font-weight: 600;
      text-align: right;
      word-break: break-word;
    }
    .receipt-row--highlight {
      background: rgba(125, 211, 252, 0.06);
      border-bottom-style: solid;
      border-bottom-color: rgba(125, 211, 252, 0.2);
    }
    .receipt-row--highlight .receipt-v {
      color: var(--good);
    }
    .receipt-v--ok { color: var(--good) !important; }
    .receipt-v--caution { color: var(--warn) !important; }
    .receipt-v--bad { color: var(--err) !important; }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }
    button, label {
      font-family: var(--mono);
      font-size: 13px;
    }
    button {
      cursor: pointer;
      border: 1px solid rgba(103, 232, 249, 0.52);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(103, 232, 249, 0.08);
      color: var(--accent);
      transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
    }
    button:hover {
      background: rgba(103, 232, 249, 0.14);
      border-color: rgba(103, 232, 249, 0.78);
      transform: translateY(-1px);
    }
    button:disabled {
      opacity: 0.44;
      cursor: not-allowed;
      transform: none;
    }
    input[type="checkbox"] { accent-color: var(--accent); }
    .hint { color: var(--muted); }
    .history-toolbar {
      display: grid;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .history-pager {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }
    #pageLabel {
      min-width: 9em;
      text-align: center;
    }
    #histSummary {
      color: var(--muted);
      font-size: 14px;
    }
    #feed {
      margin: 0;
      padding: 14px 18px;
      list-style: none;
      font-size: 13px;
    }
    #feed li {
      border: 1px solid rgba(139, 162, 194, 0.18);
      border-radius: 16px;
      background: rgba(3, 7, 18, 0.34);
      padding: 12px;
      margin-bottom: 10px;
    }
    #feed li.k-trade { border-color: rgba(103, 232, 249, 0.26); }
    #feed li.k-skip { border-color: rgba(251, 191, 36, 0.28); }
    #feed li.k-outcome { border-color: rgba(139, 92, 246, 0.30); }
    #feed .ts {
      color: var(--dim);
      font-family: var(--mono);
    }
    details { margin-top: 8px; }
    summary {
      cursor: pointer;
      color: var(--muted);
      user-select: none;
    }
    details pre {
      margin: 8px 0 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(3, 7, 18, 0.42);
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      opacity: 0.94;
    }
    .line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .tag.win { border-color: rgba(52, 211, 153, 0.58); color: var(--good); }
    .tag.lose { border-color: rgba(251, 113, 133, 0.62); color: var(--err); }
    .tag.pending { border-color: rgba(251, 191, 36, 0.64); color: var(--warn); }
    #toast {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10;
      display: none;
      max-width: min(440px, 92vw);
      padding: 12px 14px;
      border: 1px solid rgba(251, 113, 133, 0.7);
      border-radius: 16px;
      background: rgba(31, 10, 18, 0.95);
      color: #fecdd3;
      font: 12px var(--mono);
      box-shadow: var(--shadow);
    }
    #toast.show { display: block; }
    .feed-strip {
      margin-top: 28px;
      padding: 10px 8px 4px;
      border: none;
      background: transparent;
      font: 12px/1.45 var(--mono);
      text-align: center;
    }
    .feed-strip-k {
      color: var(--dim);
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .wrap { width: min(100% - 20px, 1220px); padding-top: 10px; }
      header.hero { padding: 20px; border-radius: 22px; }
      .github-link {
        position: relative;
        top: auto;
        right: auto;
        margin-bottom: 18px;
      }
      .panel { border-radius: 18px; }
      .panel-head,
      .panel-body,
      .history-toolbar,
      .history-pager { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <a class="github-link" href="https://github.com/SilverC0de/Polymarket-AI-bot-trader-by-Nothing" target="_blank" rel="noopener noreferrer">GitHub</a>
      <p class="eyebrow">Polymarket 02 / finance surface</p>
      <h1>Live trading telemetry with a clean event ledger.</h1>
    </header>

    <main class="layout">
      <article class="panel panel--performance" aria-label="Performance metrics">
        <div class="panel-head"><span class="overview-head">Performance since <span id="performanceSince" class="overview-since-value">—</span></span></div>
        <div class="panel-body">
          <div class="receipt" id="performanceReceipt"></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <span class="overview-head">Details of ongoing 5m trade</span>
          <span class="hint">GET /finance</span>
        </div>
        <div class="panel-body">
          <div class="receipt" id="detailsReceipt"></div>
        </div>
      </article>

      <section class="panel historyPanel" aria-label="Finance history">
        <div class="panel-head">
          <span>History Page</span>
          <span class="hint">GET /finance/history/{page}</span>
        </div>
        <div class="history-toolbar">
          <div id="histSummary">Loading…</div>
          <div class="bar">
            <label><input type="checkbox" id="learnMode" /> include skips + pending</label>
          </div>
        </div>
        <ul id="feed"></ul>
        <div class="history-pager" role="navigation" aria-label="History pages">
          <button type="button" id="prevP">⟨</button>
          <span id="pageLabel">page 1</span>
          <button type="button" id="nextP">⟩</button>
        </div>
      </section>
    </main>
    <div id="toast"></div>
    <footer id="feedStrip" class="feed-strip" role="status" aria-live="polite"></footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let historyPage = 1;
    let historyMeta = { total_pages: 1 };

    function showToast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => t.classList.remove("show"), 8000);
    }

    function kindClass(kind) {
      if (kind === "trade") return "k-trade";
      if (kind === "skip") return "k-skip";
      if (kind === "outcome") return "k-outcome";
      return "";
    }

    function fmtNum(n, dec = 2) {
      if (typeof n !== "number" || Number.isNaN(n)) return String(n);
      return n.toFixed(dec);
    }

    /** API may send win_rate as 0–100 (percent) or 0–1 (fraction); normalize for display */
    function winRateAsPercent(raw) {
      if (typeof raw !== "number" || Number.isNaN(raw)) return 0;
      if (raw > 1) return raw;
      return raw * 100;
    }

    function winRateAsFraction(raw) {
      if (typeof raw !== "number" || Number.isNaN(raw)) return 0;
      if (raw > 1) return raw / 100;
      return raw;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function receiptRowText(label, value, { rowClass = "", valueClass = "" } = {}) {
      const rc = rowClass ? ` ${rowClass}` : "";
      const vc = valueClass ? ` ${valueClass}` : "";
      return (
        `<div class="receipt-row${rc}">` +
        `<span class="receipt-k">${escapeHtml(label)}</span>` +
        `<span class="receipt-v${vc}">${escapeHtml(String(value))}</span>` +
        `</div>`
      );
    }

    /** Details panel: Trend from spot − target (same as Difference). */
    function fmtDetailsTrendFromDiff(s) {
      const d = s.price_diff;
      if (typeof d !== "number" || Number.isNaN(d)) return "—";
      if (d > 0) return "Up";
      if (d < 0) return "Down";
      return "—";
    }

    function skipReasonTitles() {
      return {
        price_diff_too_small: "Price too close to target price",
        price_diff_too_large: "Price too far from target price",
        timing_too_early: "Too long until market end",
        timing_too_late: "Too close to expiry",
        sideways_market: "Sideways market",
        trend_unclear: "Trend unclear",
        swing_detected: "Swing detected",
        no_liquidity: "No market liquidity",
        already_resolved: "Market has ended",
        weak_momentum: "Weak momentum",
        overextended: "Overextended price movement",
        dangerous_pattern: "Dangerous pattern",
      };
    }

    function humanizeSkipCode(code) {
      return String(code || "")
        .split("_")
        .filter(Boolean)
        .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
        .join(" ");
    }

    function buildSkipReasonRows(sr) {
      const raw = sr && typeof sr === "object" ? sr : {};
      const entries = Object.entries(raw)
        .map(([k, v]) => [k, typeof v === "number" ? v : Number(v)])
        .filter(([, n]) => Number.isFinite(n) && n > 0)
        .sort((a, b) => b[1] - a[1]);
      if (!entries.length) {
        return receiptRowText("Skip reasons", "—");
      }
      const titles = skipReasonTitles();
      const items = entries
        .map(([code, count]) => {
          const title = titles[code] || humanizeSkipCode(code) || code;
          const head = `${title} — ${count}×`;
          return `<li class="skip-reason-item"><span class="skip-reason-head">${escapeHtml(head)}</span></li>`;
        })
        .join("");
      return (
        `<div class="receipt-row receipt-row--skips">` +
        `<span class="receipt-k">Skip reasons</span>` +
        `<div class="receipt-v receipt-v--skips"><ul class="skip-reason-list">${items}</ul></div>` +
        `</div>`
      );
    }

    function sessionUptimeLabel(uptime) {
      const t = String(uptime ?? "").trim();
      if (!t || t === "0s") return "—";
      return t;
    }

    function fmtStatus(s) {
      const warn = !(s.price_feed_healthy && s.ws_connected);

      const uptimeLbl = sessionUptimeLabel(s.uptime);
      if ($("performanceSince")) $("performanceSince").textContent = uptimeLbl;

      const st = s.stats || {};
      const wrPct = winRateAsPercent(st.win_rate);
      const age = typeof s.price_age_seconds === "number" ? s.price_age_seconds : 0;
      const feedOk = !!(s.price_feed_healthy && s.ws_connected);
      const pendingN = st.pending ?? 0;
      const pendingCls = pendingN > 0 ? "receipt-v--caution" : "";

      const btc =
        typeof s.current_btc_price === "number" ? `$${fmtNum(s.current_btc_price, 2)}` : "—";
      let det = "";
      det += receiptRowText("Server time", String(s.server_time || "—"));
      det += receiptRowText("Polymarket time", String(s.polymarket_time || "—"));
      det += receiptRowText("Uptime", String(s.uptime || "—"));
      det += receiptRowText("BTC spot", btc);
      det += receiptRowText("Target", s.target_price != null ? fmtNum(s.target_price, 2) : "—");
      det += receiptRowText("Difference", s.price_diff != null ? fmtNum(s.price_diff, 2) : "—");
      det += receiptRowText("Trend", fmtDetailsTrendFromDiff(s));
      det += receiptRowText("Time to market end", String(s.time_to_end || "—"));
      $("detailsReceipt").innerHTML = det;

      const strip = $("feedStrip");
      if (strip) {
        const feedPart = `${fmtNum(age, 2)}s · ${s.price_feed_healthy ? "tick OK" : "stale"} · ws ${s.ws_connected ? "up" : "down"}`;
        const vCls = !feedOk ? "receipt-v--bad" : age > 5 ? "receipt-v--caution" : "receipt-v--ok";
        strip.innerHTML =
          `<span class="feed-strip-k">Feed health</span> <span class="${vCls}">${escapeHtml(feedPart)}</span>`;
      }

      const sr = st.skip_reasons || {};
      let perfR = "";
      perfR += receiptRowText("Trades (logged)", String(st.total_trades ?? 0));
      perfR += receiptRowText("Wins", String(st.wins ?? 0));
      perfR += receiptRowText("Losses", String(st.losses ?? 0));
      perfR += receiptRowText("Pending", String(st.pending ?? 0), { valueClass: pendingCls });
      perfR += receiptRowText("Win rate", `${fmtNum(wrPct, 2)}%`, { rowClass: "receipt-row--highlight" });
      perfR += receiptRowText("Skipped markets", String(st.total_skipped ?? 0));
      perfR += buildSkipReasonRows(sr);
      for (const [k, v] of buildInterpretationRows(s)) {
        perfR += receiptRowText(k, v);
      }
      $("performanceReceipt").innerHTML = perfR;

      return warn ? "WARN" : "OK";
    }

    function buildInterpretationRows(s) {
      const st = s.stats || {};
      const wrFrac = winRateAsFraction(st.win_rate);
      const feedOk = !!(s.price_feed_healthy && s.ws_connected);
      const pending = st.pending ?? 0;

      const conf = feedOk ? (wrFrac >= 0.55 ? "high" : wrFrac >= 0.50 ? "medium" : "low") : "low";
      const watch = pending > 0 ? `${pending} trade(s) still pending resolution` : "no pending trades";
      return [
        ["Confidence", conf],
        ["What to watch", watch],
      ];
    }

    function shortenData(kind, data) {
      try {
        const o =
          typeof data === "string"
            ? JSON.parse(data || "{}")
            : data && typeof data === "object"
              ? data
              : {};
        if (kind === "trade") {
          const id = o.ID ?? "?";
          const dir = o.Direction ?? o.direction ?? "?";
          const outcome = o.Outcome ?? o.outcome ?? "?";
          return `#${id} ${dir} ${outcome}`;
        }
        if (kind === "skip") return String(o.Reason ?? o.reason ?? "");
        if (kind === "outcome") {
          const mid = String(o.MarketID ?? o.market_id ?? "");
          const res = o.Result ?? o.result ?? "";
          const diff = typeof o.PriceDiff === "number" ? fmtNum(o.PriceDiff, 2) : "";
          const tail = mid ? mid.slice(-8) : "market";
          const extra = [res ? `res=${res}` : "", diff ? `Δ=${diff}` : ""].filter(Boolean).join(" ");
          return extra ? `${tail} ${extra}` : tail;
        }
      } catch (_) {}
      return "{}";
    }

    async function refreshStatus() {
      const r = await fetch("/finance?history_limit=30", {
        headers: { Accept: "application/json" },
      });
      if (!r.ok) throw new Error("GET /finance failed: " + r.status);
      const s = await r.json();
      return fmtStatus(s);
    }

    function collapseTradeLifecycle(events) {
      const list = Array.isArray(events) ? events : [];
      const bestByKey = new Map();
      list.forEach((e, idx) => {
        if (e.kind !== "trade") return;
        const key = tradeLifecycleKey(e);
        if (!key) return;
        const current = bestByKey.get(key);
        const score = tradeOutcomeScore(e);
        if (!current || score > current.score) {
          bestByKey.set(key, { idx, score });
        }
      });
      const seen = new Set();
      return list.filter((e, idx) => {
        if (e.kind !== "trade") return true;
        const key = tradeLifecycleKey(e);
        if (!key) return true;
        if (seen.has(key)) return false;
        const best = bestByKey.get(key);
        if (best && best.idx !== idx) return false;
        seen.add(key);
        return true;
      });
    }

    function tradeLifecycleKey(e) {
      const t = safeParse(e.data) || {};
      const id = t.ID ?? t.id;
      const marketID = t.MarketID ?? t.market_id;
      const entryTime = t.EntryTime ?? t.entry_time;
      const direction = t.Direction ?? t.direction;
      if (id == null || !marketID || !entryTime) return "";
      return `${marketID}|${id}|${direction || ""}|${entryTime}`;
    }

    function tradeOutcomeScore(e) {
      const t = safeParse(e.data) || {};
      const out = String(t.Outcome ?? t.outcome ?? "").toUpperCase();
      if (out === "WIN" || out === "LOSE") return 2;
      if (out === "PENDING") return 1;
      return 0;
    }

    function renderHistory(h) {
      historyMeta.total_pages = h.total_pages || 1;
      const rawEvents = h.events || [];
      const displayEvents = collapseTradeLifecycle(rawEvents);
      const collapsedCount = rawEvents.length - displayEvents.length;
      const collapsedText = collapsedCount > 0 ? ` · collapsed ${collapsedCount}` : "";
      $("pageLabel").textContent = `page ${h.page}/${h.total_pages || 1} · rows ${displayEvents.length}${collapsedText}`;
      if ($("histSummary")) $("histSummary").textContent = buildHistorySummary({ ...h, events: displayEvents });
      const ul = $("feed");
      ul.innerHTML = "";
      displayEvents.forEach((e) => {
        const li = document.createElement("li");
        li.className = kindClass(e.kind || "");
        const ts = escapeHtml(String(e.ts || ""));
        const pretty = prettifyPayload(e.kind, e.data);
        const line = buildEventLine(e);
        li.innerHTML =
          `<div class="line"><span class="ts">${ts}</span>${line}</div>` +
          `<details><summary>details</summary><pre>${pretty}</pre></details>`;
        ul.appendChild(li);
      });
      $("prevP").disabled = h.page <= 1;
      $("nextP").disabled = historyMeta.total_pages && h.page >= historyMeta.total_pages;
    }

    function buildHistorySummary(h) {
      const evs = Array.isArray(h.events) ? h.events : [];
      let wins = 0, losses = 0, pending = 0;
      let tradeCount = 0;
      for (const e of evs) {
        if (e.kind !== "trade") continue;
        const t = safeParse(e.data);
        if (!t) continue;
        tradeCount++;
        const out = String(t.Outcome ?? t.outcome ?? "").toUpperCase();
        if (out === "WIN") wins++;
        else if (out === "LOSE") losses++;
        else pending++;
      }
      const denom = (wins + losses) || 1;
      const wr = (wins / denom) * 100;
      return `This page: ${tradeCount} trades · wins ${wins} · losses ${losses} · pending ${pending} · win rate ${fmtNum(wr, 1)}%. (Total stored: ${h.total ?? "?"})`;
    }

    function buildEventLine(e) {
      const kind = String(e.kind || "?");
      if (kind === "trade") return renderTradeLine(e);
      if (kind === "skip") return `<span class="tag">SKIP</span> <span class="hint">${escapeHtml(renderSkipReason(e))}</span>`;
      if (kind === "outcome") return `<span class="tag">ROUND</span> <span class="hint">${escapeHtml(renderOutcome(e))}</span>`;
      return `<span class="tag">${escapeHtml(kind.toUpperCase())}</span>`;
    }

    function renderTradeLine(e) {
      const t = safeParse(e.data) || {};
      const id = t.ID ?? t.id ?? "?";
      const dir = String(t.Direction ?? t.direction ?? "?").toUpperCase();
      const out = String(t.Outcome ?? t.outcome ?? "?").toUpperCase();
      const entry = typeof t.EntryBTCPrice === "number" ? t.EntryBTCPrice : t.entry_btc_price;
      const fin = typeof t.FinalBTCPrice === "number" ? t.FinalBTCPrice : t.final_btc_price;
      const tagClass = out === "WIN" ? "win" : out === "LOSE" ? "lose" : "pending";
      const mid = String(t.MarketID ?? "").slice(-8);
      const move = (typeof entry === "number" && typeof fin === "number") ? `BTC ${fmtNum(entry, 0)} → ${fmtNum(fin, 0)}` : "";
      return `<span class="tag ${tagClass}">${escapeHtml(out)}</span>` +
        `<span class="tag">${escapeHtml(dir)}</span>` +
        `<span class="hint">trade #${escapeHtml(String(id))}${mid ? ` · mkt ${escapeHtml(mid)}` : ""}${move ? ` · ${escapeHtml(move)}` : ""}</span>`;
    }

    function renderSkipReason(e) {
      const s = safeParse(e.data) || {};
      return String(s.Reason ?? s.reason ?? s.Details ?? s.details ?? "skipped");
    }

    function renderOutcome(e) {
      const o = safeParse(e.data) || {};
      const res = String(o.Result ?? o.result ?? "").toUpperCase();
      const diff = typeof o.PriceDiff === "number" ? o.PriceDiff : null;
      const parts = [];
      if (res) parts.push(`result ${res}`);
      if (diff != null) parts.push(`Δ ${fmtNum(diff, 2)}`);
      return parts.join(" · ") || "round ended";
    }

    function safeParse(data) {
      if (data == null) return null;
      if (typeof data === "object") return data;
      if (typeof data === "string") {
        try { return JSON.parse(data); } catch { return null; }
      }
      return null;
    }

    function prettifyPayload(kind, data) {
      let raw = data;
      if (typeof data === "string") {
        try {
          raw = JSON.parse(data);
        } catch {
          raw = data;
        }
      }
      if (typeof raw === "object" && raw !== null) {
        return escapeHtml(JSON.stringify(stripPnlKeys(raw), null, 2));
      }
      return escapeHtml(String(raw ?? ""));
    }

    function stripPnlKeys(value) {
      if (Array.isArray(value)) return value.map(stripPnlKeys);
      if (!value || typeof value !== "object") return value;
      return Object.fromEntries(
        Object.entries(value)
          .filter(([key]) => !isPnlKey(key))
          .map(([key, val]) => [key, stripPnlKeys(val)])
      );
    }

    function isPnlKey(key) {
      const normalized = String(key).replaceAll("_", "").toLowerCase();
      return normalized === "pnl" || normalized === "ourpnl" || normalized === "totalpnl";
    }

    async function refreshHistory() {
      const learn = $("learnMode").checked ? "true" : "false";
      const r = await fetch(`/finance/history/${historyPage}?learn=${learn}`, {
        headers: { Accept: "application/json" },
      });
      if (!r.ok) throw new Error("GET /finance/history failed: " + r.status);
      const h = await r.json();
      renderHistory(h);
    }

    async function pulseLive() {
      try {
        await refreshStatus();
      } catch (err) {
        showToast(String(err.message));
      }
    }

    async function pulse() {
      await pulseLive();
      try {
        await refreshHistory();
      } catch (err) {
        showToast(String(err.message));
      }
    }

    $("prevP").addEventListener("click", () => {
      if (historyPage > 1) {
        historyPage--;
        refreshHistory().catch((e) => showToast(String(e.message)));
      }
    });
    $("nextP").addEventListener("click", () => {
      if (historyPage < historyMeta.total_pages) {
        historyPage++;
        refreshHistory().catch((e) => showToast(String(e.message)));
      }
    });
    $("learnMode").addEventListener("change", () => {
      refreshHistory().catch((e) => showToast(String(e.message)));
    });

    pulse().catch(() => {});
    setInterval(() => pulseLive().catch(() => {}), 3000);
  </script>
</body>
</html>
